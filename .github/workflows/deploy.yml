# -----------------------------------------------------------------------------
# Deploy Workflow
# Runs on every merge to main.
# Builds Docker images, scans with Trivy, runs Terraform plan,
# deploys to dev automatically, then waits for manual approval for prod.
#
# Prerequisites (set these in GitHub repo Settings > Secrets and variables > Actions):
#   AWS_ACCOUNT_ID       -- your AWS account ID (167715593994)
#   AWS_ACCESS_KEY_ID    -- IAM user access key
#   AWS_SECRET_ACCESS_KEY -- IAM user secret key
#   MANIFESTS_PAT        -- GitHub PAT with repo scope for sre-portfolio-manifests
# -----------------------------------------------------------------------------
name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ---------------------------------------------------------------------------
  # BUILD
  # Builds both Docker images and pushes them to ECR.
  # Uses the short git SHA as the image tag for traceability --
  # you can always trace a running pod back to the exact commit that built it.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      # Pass the image tag to downstream jobs so they all use the same tag
      image-tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: tag
        # Use first 8 characters of git SHA as image tag
        # Short enough to be readable, unique enough to avoid collisions
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        run: |
          docker build \
            -t $ECR_REGISTRY/dev-sre-portfolio-api:${{ steps.tag.outputs.sha }} \
            services/api/
          docker push $ECR_REGISTRY/dev-sre-portfolio-api:${{ steps.tag.outputs.sha }}

      - name: Build and push Worker image
        run: |
          docker build \
            -t $ECR_REGISTRY/dev-sre-portfolio-worker:${{ steps.tag.outputs.sha }} \
            services/worker/
          docker push $ECR_REGISTRY/dev-sre-portfolio-worker:${{ steps.tag.outputs.sha }}

  # ---------------------------------------------------------------------------
  # SCAN
  # Scans both images for CVEs using Trivy.
  # Fails the pipeline if any HIGH or CRITICAL vulnerabilities are found.
  # This is shift-left security -- catching vulnerabilities before deployment.
  # ---------------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    needs: build    # Wait for build to finish before scanning

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dev-sre-portfolio-api:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: "1"          # Fail the pipeline on findings
          severity: HIGH,CRITICAL # Only fail on HIGH and CRITICAL -- ignore LOW/MEDIUM

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dev-sre-portfolio-worker:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

  # ---------------------------------------------------------------------------
  # TERRAFORM PLAN
  # Runs terragrunt plan against the dev environment.
  # This validates that infrastructure changes are safe before applying.
  # The plan output is visible in the GitHub Actions logs for review.
  # Note: This only PLANS, never applies -- infrastructure changes
  # are applied manually to maintain control over AWS costs.
  # ---------------------------------------------------------------------------
  terraform-plan:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/
