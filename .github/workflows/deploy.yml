name: Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        run: |
          docker build \
            -t $ECR_REGISTRY/dev-sre-portfolio-api:${{ steps.tag.outputs.sha }} \
            services/api/
          docker push $ECR_REGISTRY/dev-sre-portfolio-api:${{ steps.tag.outputs.sha }}

      - name: Build and push Worker image
        run: |
          docker build \
            -t $ECR_REGISTRY/dev-sre-portfolio-worker:${{ steps.tag.outputs.sha }} \
            services/worker/
          docker push $ECR_REGISTRY/dev-sre-portfolio-worker:${{ steps.tag.outputs.sha }}

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dev-sre-portfolio-api:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/dev-sre-portfolio-worker:${{ needs.build.outputs.image-tag }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

  terraform-plan:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Install Terragrunt
        run: |
          wget -q https://github.com/gruntwork-io/terragrunt/releases/download/v0.54.0/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Terragrunt plan -- VPC
        run: |
          cd terraform/envs/dev/vpc
          terragrunt plan --terragrunt-non-interactive
        continue-on-error: true

      - name: Terragrunt plan -- EKS
        run: |
          cd terraform/envs/dev/eks
          terragrunt plan --terragrunt-non-interactive
        continue-on-error: true

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [build, scan, terraform-plan]
    environment: dev

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: HonorioTaveras/sre-portfolio-manifests
          token: ${{ secrets.MANIFESTS_PAT }}

      - name: Update API image tag
        run: |
          sed -i 's|tag:.*|tag: ${{ needs.build.outputs.image-tag }}|' charts/api/values-dev.yaml

      - name: Update Worker image tag
        run: |
          sed -i 's|tag:.*|tag: ${{ needs.build.outputs.image-tag }}|' charts/worker/values-dev.yaml

      - name: Commit and push updated tags
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add charts/api/values-dev.yaml charts/worker/values-dev.yaml
          git commit -m "ci: update dev images to ${{ needs.build.outputs.image-tag }}"
          git push

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: HonorioTaveras/sre-portfolio-manifests
          token: ${{ secrets.MANIFESTS_PAT }}

      - name: Update API image tag -- prod
        run: |
          sed -i 's|tag:.*|tag: ${{ needs.build.outputs.image-tag }}|' charts/api/values-prod.yaml

      - name: Update Worker image tag -- prod
        run: |
          sed -i 's|tag:.*|tag: ${{ needs.build.outputs.image-tag }}|' charts/worker/values-prod.yaml

      - name: Commit and push updated tags
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add charts/api/values-prod.yaml charts/worker/values-prod.yaml
          git commit -m "ci: promote images to ${{ needs.build.outputs.image-tag }} [prod]"
          git push
